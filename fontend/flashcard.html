<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Flashcard - QuizAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/flashcard.css">
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <i class="fa-solid fa-brain me-2"></i>QuizAI
            </a>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html">Tạo Quiz</a></li>
                    <li class="nav-item"><a class="nav-link" href="my_quizzes.html">Thư viện</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <a href="my_quizzes.html" class="btn btn-outline-light btn-sm">
                        <i class="fa-solid fa-arrow-left me-1"></i> Thoát
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        
        <h3 class="text-center mb-4 text-primary" id="quiz-title">Đang tải...</h3>

        <div class="flashcard-container">
            <div class="flashcard" id="flashcard">
                <div class="flashcard-front">
                    <div class="card-label">CÂU HỎI</div>
                    <div class="flashcard-content" id="card-front-content">
                        </div>
                    <div class="hint-text"><i class="fa-solid fa-rotate"></i> Nhấn để xem đáp án</div>
                </div>

                <div class="flashcard-back">
                    <div class="card-label">ĐÁP ÁN</div>
                    <div class="flashcard-content" id="card-back-content">
                        </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center align-items-center mt-4 gap-3">
            <button class="btn btn-secondary btn-lg" id="prev-card">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            
            <span class="fs-5 fw-bold text-muted" id="card-counter">1 / 10</span>
            
            <button class="btn btn-primary btn-lg" id="next-card">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>

        <div class="text-center mt-3">
            <button class="btn btn-outline-warning" id="shuffle-card-btn">
                <i class="fa-solid fa-shuffle me-1"></i> Trộn thẻ
            </button>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/flashcard.js" defer></script>
</body>
</html>
