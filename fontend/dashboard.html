<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - QuizAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar mb-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <i class="fa-solid fa-brain me-2"></i>QuizAI
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="index.html">Tạo Quiz</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="my_quizzes.html">Thư viện</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="navbar-text me-3 text-white fw-bold" id="welcome-message"></span>
                    <button class="btn btn-outline-light btn-sm rounded-circle" id="logout-button" title="Đăng xuất">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-dark fw-bold">Tổng quan học tập</h2>
            <a href="index.html" class="btn btn-primary shadow-sm">
                <i class="fa-solid fa-plus me-1"></i> Tạo Quiz Mới
            </a>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-xl-3 col-md-6">
                <div class="card stats-card bg-gradient-primary h-100">
                    <div class="card-body">
                        <div class="text-uppercase small fw-bold mb-1">Tổng số Quiz</div>
                        <div class="h3 mb-0 fw-bold" id="stat-total-quizzes">0</div>
                        <i class="fa-solid fa-folder-open stats-icon"></i>
                    </div>
                </div>
            </div>
            
            <div class="col-xl-3 col-md-6">
                <div class="card stats-card bg-gradient-info h-100">
                    <div class="card-body">
                        <div class="text-uppercase small fw-bold mb-1">Câu hỏi đã ôn</div>
                        <div class="h3 mb-0 fw-bold" id="stat-total-questions">0</div>
                        <i class="fa-solid fa-pen-to-square stats-icon"></i>
                    </div>
                </div>
            </div>

            <div class="col-xl-3 col-md-6">
                <div class="card stats-card bg-gradient-success h-100">
                    <div class="card-body">
                        <div class="text-uppercase small fw-bold mb-1">Số câu đúng</div>
                        <div class="h3 mb-0 fw-bold" id="stat-total-correct">0</div>
                        <i class="fa-solid fa-check-circle stats-icon"></i>
                    </div>
                </div>
            </div>

            <div class="col-xl-3 col-md-6">
                <div class="card stats-card bg-gradient-warning h-100">
                    <div class="card-body">
                        <div class="text-uppercase small fw-bold mb-1">Số câu sai</div>
                        <div class="h3 mb-0 fw-bold" id="stat-total-incorrect">0</div>
                        <i class="fa-solid fa-circle-exclamation stats-icon"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            
            <div class="col-lg-5">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white py-3">
                        <h6 class="m-0 fw-bold text-primary">Hiệu quả ôn tập</h6>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="accuracyChart"></canvas>
                        </div>
                        <div class="mt-3 text-center small text-muted">
                            Biểu đồ thể hiện tỷ lệ câu trả lời Đúng/Sai của bạn.
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 fw-bold text-primary">Quiz vừa tạo gần đây</h6>
                        <a href="my_quizzes.html" class="text-decoration-none small">Xem tất cả &rarr;</a>
                    </div>
                    <div class="card-body p-0">
                        <div class="list-group list-group-flush" id="recent-quiz-list">
                            <div class="text-center p-4 text-muted">Đang tải dữ liệu...</div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
