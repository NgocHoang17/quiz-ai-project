<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện - QuizAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="dashboard.html"><i class="fa-solid fa-brain me-2"></i>QuizAI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html">Tạo Quiz</a></li>
                    <li class="nav-item"><a class="nav-link active" href="my_quizzes.html">Thư viện</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="navbar-text me-3 text-white" id="welcome-message"></span>
                    <button class="btn btn-outline-danger btn-sm" id="logout-button"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="card shadow-sm border-0 min-vh-100"> <div class="card-header bg-white py-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0 fw-bold text-primary"><i class="fa-solid fa-folder-open me-2"></i>Thư viện của tôi</h4>
                    <button class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#createFolderModal">
                        <i class="fa-solid fa-folder-plus me-1"></i> Tạo thư mục
                    </button>
                </div>
                
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0 fs-5" id="folder-breadcrumb">
                        <li class="breadcrumb-item active">Thư mục gốc</li>
                    </ol>
                </nav>
            </div>

            <div class="card-body">
                <p id="loading-indicator" class="text-center text-primary" style="display: none;">
                </p>

                <div id="folders-container" class="row g-3 mb-4">
                    </div>

                <hr id="folder-divider" class="my-4" style="display: none;">

                <div id="quiz-list-container" class="list-group list-group-flush">
                    </div>
                
                <p id="empty-msg" class="text-muted text-center mt-4" style="display: none;">Thư mục trống.</p>
            </div>
        </div>
    </main>

    <div class="modal fade" id="viewQuizModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="viewQuizModalLabel">Nội dung</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body" id="viewQuizModalBody"></div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="startQuizOptionsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Tùy chọn</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="form-check form-switch mb-2"><input class="form-check-input" type="checkbox" id="modal-shuffle-questions"><label class="form-check-label">Trộn câu hỏi</label></div>
                    <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="modal-shuffle-choices"><label class="form-check-label">Trộn đáp án</label></div>
                </div>
                <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button><button class="btn btn-primary" id="start-quiz-button">Bắt đầu!</button></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createFolderModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Tạo thư mục mới</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="text" class="form-control" id="new-folder-name" placeholder="Nhập tên thư mục (vd: Lịch sử, Toán...)">
                </div>
                <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button><button class="btn btn-primary" id="confirm-create-folder">Tạo</button></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="moveQuizModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">Di chuyển Quiz đến...</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <p>Chọn thư mục đích:</p>
                    <select class="form-select" id="move-folder-select">
                        <option value="">(Thư mục gốc)</option>
                        </select>
                </div>
                <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button><button class="btn btn-primary" id="confirm-move-quiz">Di chuyển</button></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/my_quizzes.js" defer></script>
</body>
</html>
