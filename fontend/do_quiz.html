<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làm Quiz - QuizAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/do_quiz.css">
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">QuizAI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Tạo Quiz mới</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="my_quizzes.html">Quiz của tôi</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center" id="user-info-nav">
                    </div>
            </div>
        </div>
    </nav>

    <main class="container mt-4 quiz-container">
        <div class="card shadow-sm">
            <div class="card-body">
                
                <div id="quiz-result-display" style="display: none;">
                    <h2 class="h4" id="quiz-result-title">Kết quả</h2>
                    <p class="fs-5" id="quiz-score">Bạn đã đúng 0/0 câu.</p>
                    <button class="btn btn-primary" onclick="location.reload()">Làm lại</button>
                    <a href="my_quizzes.html" class="btn btn-secondary">Quay về danh sách</a>
                </div>

                <div id="quiz-questions-wrapper">
                    <h2 class="h4" id="quiz-title">Đang tải quiz...</h2>
                    <hr>
                    
                    <div id="question-container">
                        <p class.="fs-5" id="question-text">Câu hỏi...</p>
                        <div id="choices-container" class="mt-3">
                            </div>
                    </div>
                    
                    <p id="quiz-error" class="text-danger"></p>

                    <div class="d-flex justify-content-between mt-4">
                        <button class="btn btn-secondary" id="prev-button" disabled>Câu trước</button>
                        <span id="question-counter" class="align-self-center text-muted">Câu 1 / X</span>
                        <button class="btn btn-primary" id="next-button">Câu tiếp</button>
                        <button class="btn btn-success" id="submit-button" style="display: none;">Nộp bài</button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/do_quiz.js" defer></script>
</body>
</html>
