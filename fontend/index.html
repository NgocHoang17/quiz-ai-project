<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ - QuizAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">QuizAI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Tạo Quiz mới</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="my_quizzes.html">Quiz của tôi</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="navbar-text me-3" id="welcome-message"></span>
                    <button class="btn btn-outline-danger" id="logout-button">Đăng xuất</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div class="row g-4">
            
            <div class="col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        
                        <ul class="nav nav-tabs" id="createQuizTab" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="text-tab" data-bs-toggle="tab" data-bs-target="#text-tab-pane" type="button" role="tab" aria-controls="text-tab-pane" aria-selected="true">Dán văn bản</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="file-tab" data-bs-toggle="tab" data-bs-target="#file-tab-pane" type="button" role="tab" aria-controls="file-tab-pane" aria-selected="false">Tải file lên (.txt, .pdf, .docx, .pptx)</button>
                            </li>
                        </ul>
                        <div class="tab-content" id="createQuizTabContent">
                            
                            <div class="tab-pane fade show active p-3" id="text-tab-pane" role="tabpanel" aria-labelledby="text-tab" tabindex="0">
                                <h2 class="h4 card-title">Tạo Quiz từ văn bản</h2>
                                <p class="card-text">Dán văn bản của bạn vào ô bên dưới.</p>
                                <textarea class="form-control" id="text-input" rows="10" placeholder="Dán văn bản của bạn vào đây..."></textarea>
                            </div>
                            
                            <div class="tab-pane fade p-3" id="file-tab-pane" role="tabpanel" aria-labelledby="file-tab" tabindex="0">
                                <h2 class="h4 card-title">Tạo Quiz từ File</h2>
                                <p class="card-text">Chọn một file .txt, .pdf, .docx hoặc .pptx để tải lên.</p>
                                <input class="form-control" type="file" id="file-input" accept=".txt,.pdf,.docx,.pptx">
                            </div>

                        </div>
                        <button class="btn btn-primary w-100 mt-3" id="generate-button">
                            Tạo Quiz
                        </button>
                        
                        <p id="loading" class="mt-3 text-primary" style="display: none;">
                            Đang xử lý, vui lòng chờ...
                        </p>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="h4 card-title">Kết quả</h2>
                        
                        <button class="btn btn-success w-100 mb-3" id="save-quiz-button" style="display: none;">
                            Lưu Quiz này
                        </button>
                        <p id="save-quiz-message"></p>

                        <div id="quiz-result">
                            <p class="text-muted">Kết quả quiz sẽ xuất hiện ở đây...</p>
                        </div>
                    </div>
                </div>
            </div>

        </div> </main> <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js" defer></script>
</body>
</html>
