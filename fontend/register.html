<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - QuizAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary">
    
    <main class="auth-card">
        <form id="register-form">
            <h1 class="h3 mb-3 fw-normal text-center">Tạo tài khoản</h1>

            <div class="form-floating">
                <input type="email" class="form-control" id="register-email" placeholder="name@example.com" required>
                <label for="register-email">Email</label>
            </div>
            <div class="form-floating">
                <input type="password" class="form-control" id="register-password" placeholder="Password" required>
                <label for="register-password">Mật khẩu</label>
            </div>

            <button class="btn btn-primary w-100 py-2" type="submit">Đăng ký</button>
            
            <p id="auth-message" class="auth-message mt-2"></p>
            
            <div class="switch-page mt-3 text-center">
                Đã có tài khoản? <a href="login.html">Đăng nhập</a>
            </div>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js" defer></script>
</body>
</html>
